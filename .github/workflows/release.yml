name: Release

# Builds Linux and Windows binaries and attaches them to a GitHub Release
# whenever a version tag (v1.0.0, v0.2.1, ...) is pushed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: solardash
            archive: solardash-${{ github.ref_name }}-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: solardash.exe
            archive: solardash-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ALSA dev headers (Linux audio)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      # The audio/ directory ships alongside the binary: alerts load
      # WAV files from ./audio relative to the working directory.
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/solardash
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/solardash/
          cp -r audio README.md dist/solardash/
          tar -C dist -czf ${{ matrix.archive }} solardash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/solardash | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/solardash/
          Copy-Item -Recurse audio dist/solardash/audio
          Copy-Item README.md dist/solardash/
          Compress-Archive -Path dist/solardash -DestinationPath ${{ matrix.archive }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
